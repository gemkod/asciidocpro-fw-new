#        linkdef:
#            text_decoration: underline
#            text_decoration: 428BCA
        keyword:
            color: E25800
            style: bold
        definition:
            color: E25800
            style: bold
        green:
            color: 08a608
        blue:
            color: 1b26bd
        steelblue:
            color: 428BCA
        orange:
            color: ff9e00
        star:
            color: f4e100
        red:
            color: bd0000
        lightpurple:
            color: cf81e3
