            color: 556B2F
            bgcolor: F5F5DC
            font_style: normal
#            border_offset: 1 #décalage des bordures par rapport au texte
#            border_width: [0, 3, 0, 3] # "casse le document"
            border_radius: $base_border_radius
#            padding: [2, 4, 2, 4] #ne fonctionne pas sur un élément en ligne et display inline block ne foncitonne pas
        uidrs:
            font_size: round($base_font_size * 0.8)
            color: 0e3865
            bgcolor: ffffff
#            border: solid 1px 0e3865
#            font_style: normal
            border_radius: $base_border_radius
        adpm:
            version:
                number:
                    style: bold
                date:
                    style: normal


