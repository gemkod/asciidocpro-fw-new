                    Violet éclairci #9B6DD8 | Ardoise claire #8A90B0

<!-- affichage_index.js -->
<script>
    document.addEventListener('DOMContentLoaded', function () {
        'use strict';

        const indexEnabled = '{adp_html_show_index}' === '1';
        if (!indexEnabled) return;

        const keywords = Array.from(document.querySelectorAll('span.keyword'));
        if (!keywords.length) return;

        // --- 1. Attribuer un id unique à chaque occurrence ---
        const keywordMap = {};

        keywords.forEach((span) => {
            const term = span.textContent.trim();
            if (!keywordMap[term]) keywordMap[term] = [];
            const idx = keywordMap[term].length;
            span.id = `kw-${term.toLowerCase().replace(/\s+/g, '-')}-${idx}`;
            keywordMap[term].push(span);
        });

        // --- 2. Barre de navigation flottante ---
        const navbar = document.createElement('div');
        navbar.id = 'adp-kw-navbar';
        navbar.style.display = 'none';
        navbar.innerHTML = `
            <span id="adp-kw-navbar-term"></span>
            <button id="adp-kw-prev" title="Occurrence précédente">&#8249;</button>
            <span id="adp-kw-counter"></span>
            <button id="adp-kw-next" title="Occurrence suivante">&#8250;</button>
            <button id="adp-kw-close" title="Fermer">✕</button>
        `;
        document.body.appendChild(navbar);

        let activeTerm = null;
        let activeCursor = 0;

        function highlightCurrent() {
            keywordMap[activeTerm].forEach(span => span.classList.remove('adp-kw-active'));
            const target = keywordMap[activeTerm][activeCursor];
            target.classList.add('adp-kw-active');
            target.scrollIntoView({ behavior: 'smooth', block: 'center' });
            document.getElementById('adp-kw-counter').textContent =
                `${activeCursor + 1} / ${keywordMap[activeTerm].length}`;
        }

        function openNavbar(term, cursor) {
            if (activeTerm && activeTerm !== term) {
                keywordMap[activeTerm].forEach(span => span.classList.remove('adp-kw-active'));
            }
            activeTerm = term;
            activeCursor = cursor;

            // une seule occurrence : scroll direct, pas de navbar
            if (keywordMap[term].length === 1) {
                const target = keywordMap[term][0];
                target.classList.add('adp-kw-active');
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                return;
            }

            document.getElementById('adp-kw-navbar-term').textContent = `« ${term} »`;
            navbar.style.display = 'flex';
            highlightCurrent();
        }

        function closeNavbar() {
            if (activeTerm) {
                keywordMap[activeTerm].forEach(span => span.classList.remove('adp-kw-active'));
            }
            activeTerm = null;
            navbar.style.display = 'none';
        }

        document.getElementById('adp-kw-prev').addEventListener('click', () => {
            activeCursor = (activeCursor - 1 + keywordMap[activeTerm].length) % keywordMap[activeTerm].length;
            highlightCurrent();
        });

        document.getElementById('adp-kw-next').addEventListener('click', () => {
            activeCursor = (activeCursor + 1) % keywordMap[activeTerm].length;
            highlightCurrent();
        });

        document.getElementById('adp-kw-close').addEventListener('click', closeNavbar);

        document.addEventListener('click', (e) => {
            if (
                activeTerm &&
                !e.target.closest('#adp-kw-navbar') &&
                !e.target.closest('span.keyword') &&
                !e.target.closest('.adp-index-tag')
            ) {
                closeNavbar();
            }
        });

        // --- 3. Clic sur un span.keyword dans le texte ---
        keywords.forEach((span) => {
            span.addEventListener('click', (e) => {
                e.stopPropagation();
                const term = span.textContent.trim();
                const cursor = keywordMap[term].indexOf(span);
                openNavbar(term, cursor);
            });
        });

        // --- 4. Construire la zone de tags ---
        const position = '{adp_html_index_position}' === 'start' ? 'start' : 'end';

        const tagsContainer = document.createElement('div');
        tagsContainer.id = 'adp-index-tags';

        Object.keys(keywordMap).sort().forEach((term) => {
            const occurrences = keywordMap[term];

            const tag = document.createElement('span');
            tag.className = 'adp-index-tag';
            tag.innerHTML = occurrences.length > 1
                ? `${term} <span class="adp-index-badge">${occurrences.length}</span>`
                : term;
            tag.setAttribute('title', `${occurrences.length} occurrence(s)`);
            tag.setAttribute('role', 'button');
            tag.tabIndex = 0;

            tag.addEventListener('click', (e) => {
                e.stopPropagation();
                const cursor = (activeTerm === term) ? activeCursor : 0;
                openNavbar(term, cursor);
            });

            tagsContainer.appendChild(tag);
        });

        // --- 5. Insérer la zone de tags ---
        const content = document.getElementById('content');

        if (position === 'start') {
            content.prepend(tagsContainer);
        } else {
            content.appendChild(tagsContainer);
        }

    });
</script>

<!-- bouton_afficher_masquer_reponse.js -->
<script>
document.addEventListener('DOMContentLoaded', function () {
    'use strict';

    if (document.querySelector('link[href^="http://localhost:"]')) return;

    const toggleEnabled = '{adp_html_toggle_answer}' === '1';
    if (!toggleEnabled) return;

    const answers = Array.from(document.querySelectorAll('.sidebarblock.answer'));
    if (!answers.length) return;

    function findQuestionAbove(el) {
        let sibling = el.previousElementSibling;
        while (sibling) {
            if (sibling.classList.contains('question')) return sibling;
            sibling = sibling.previousElementSibling;
        }
        return null;
    }

    function findBtnFor(block) {
        const q = findQuestionAbove(block);
        return q ? q.querySelector('.adp-toggle-btn') : null;
    }

    answers.forEach((block) => {
        const questionBlock = findQuestionAbove(block);

        const btn = document.createElement('button');
        btn.className = 'adp-toggle-btn';
        btn.innerHTML = `<span class="adp-label">Cacher la correction</span>`;
        btn.setAttribute('aria-label', 'Afficher/masquer la correction');

        btn.addEventListener('click', () => {
            const hidden = block.classList.toggle('adp-hidden');
            btn.classList.toggle('is-hidden-state', hidden);
            btn.querySelector('.adp-label').textContent = hidden ? 'Voir la correction' : 'Cacher la correction';
            updateGlobalBtns();
        });

        if (questionBlock) {
            questionBlock.appendChild(btn);
        } else {
            block.parentNode.insertBefore(btn, block);
        }
    });

    const bar = document.createElement('div');
    bar.id = 'adp-global-bar';
    bar.innerHTML = `
    <button id="adp-btn-reveal">Tout révéler <span class="adp-badge" id="adp-count-hidden">0</span></button>
    <button id="adp-btn-hide">Tout masquer <span class="adp-badge" id="adp-count-visible">${answers.length}</span></button>
  `;
    document.body.appendChild(bar);

    const btnReveal = document.getElementById('adp-btn-reveal');
    const btnHide = document.getElementById('adp-btn-hide');

    function updateGlobalBtns() {
        const hiddenCount = answers.filter(b => b.classList.contains('adp-hidden')).length;
        const visibleCount = answers.length - hiddenCount;
        document.getElementById('adp-count-hidden').textContent = hiddenCount;
        document.getElementById('adp-count-visible').textContent = visibleCount;
        btnReveal.disabled = hiddenCount === 0;
        btnHide.disabled = visibleCount === 0;
    }

    function setAllAnswers(hide) {
        answers.forEach((block) => {
            block.classList.toggle('adp-hidden', hide);
            const btn = findBtnFor(block);
            if (btn) {
                btn.classList.toggle('is-hidden-state', hide);
                btn.querySelector('.adp-label').textContent = hide ? 'Voir la correction' : 'Cacher la correction';
            }
        });
        updateGlobalBtns();
    }

    btnReveal.addEventListener('click', () => setAllAnswers(false));
    btnHide.addEventListener('click', () => setAllAnswers(true));

    setAllAnswers(true);

});
</script>
